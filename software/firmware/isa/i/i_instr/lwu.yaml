name: lwu
description: Load Word Unsigned instruction test
instruction_under_test: lwu
requires: [mem-aligned-4, mem-data-start=00140010, mem-data-size=8K]

rv64:
  sequence:
    - op: li
      rd: random addr_reg
      imm:
        random:
          min: 0x0000000000140800
          max: 0x0000000000141DC8

    - op: lwu
      rd: random dst_reg
      rs1: addr_reg
      imm:
        random:
          min: -2048
          max: 2047
      format: "{op} {rd}, {imm}({rs1})"
